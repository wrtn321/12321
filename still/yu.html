            background-color: #ffffff;
            color: #37352f;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px; 
            margin: 0 auto;
            padding: 40px 20px;

        }

            color: #37352f;
        }

        h1 {

            margin: 0;
        }

        .image-gallery {

            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .image-item {
            width: 100%;
            max-width: 500px; 
            display: flex;
            flex-direction: column;
            gap: 10px; 
        }

        .image-item p {
            margin: 0;
            text-align: left;
            font-weight: 600;
            font-size: 16px;
            color: #37352f;
        }

        .image-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #ededed;
            margin-top: 40px;
