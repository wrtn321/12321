<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>벨 썸네일 모음</title>
    <style>
        /* 기본 설정 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ffffff;
            color: #37352f;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px; 
            margin: 0 auto;
            padding: 40px 20px;
            min-height: 80vh;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            text-decoration: none;
            color: #787774;
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background-color: #f7f6f3;
            color: #37352f;
        }

        h1 {
            font-size: 24px;
            margin: 0;
        }

        /* 갤러리 전체 묶음 */
        .image-gallery {
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .image-item {
            width: 100%;
            max-width: 500px; /* 이미지 최대 사이즈와 똑같이 맞춤 */
            display: flex;
            flex-direction: column;
            gap: 10px; /* 글과 이미지 사이의 간격 */
        }

        .image-item p {
            margin: 0;
            text-align: left;
            font-weight: 600;
            font-size: 16px;
            color: #37352f;
        }

        .image-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #ededed;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <a href="../index.html" class="back-btn">⬅️ 메인으로 돌아가기</a>
            <h1>너와 함께 영원한 3일을</h1>
        </header>

        <main class="image-gallery">
            <div class="image-item">
                <p>1:1 썸네일</p>
                <img src="https://12321.uk/wrtn/3%EC%9D%BC%20%EC%8D%B8%EB%84%A4%EC%9D%BC.jpg" alt="벨">
                원본
                <img src="https://12321.uk/wrtn/%EC%8D%B8%EB%84%A4%EC%9D%BC%20(1).png" alt="벨">
                디자인을 할 줄 몰라서 그냥 이미지에 제목만 달았어요😓
            </div>
            <div class="image-item">
                <p>만우절 메이드 벨</p>
                <img src="https://12321.uk/wrtn/%EB%A9%94%EC%9D%B4%EB%93%9C%203%EC%9D%BC.jpg" alt="벨">
                원본
                <img src="https://12321.uk/wrtn/%EC%8D%B8%EB%84%A4%EC%9D%BC%20(3).jpg" alt="벨">
            </div>
            <div class="image-item">
                <p>지금 썸네일</p>
                <img src="https://12321.uk/wrtn/3%EC%9D%BC_%EA%B9%80%EC%A0%95%EC%B2%A0L.png" alt="벨">
                원본
                <img src="https://12321.uk/wrtn/%EC%8D%B8%EB%84%A4%EC%9D%BC%20(2).jpg" alt="벨">
            </div>
        </main>
    </div>

    <footer>
        © 2026 crack12. All rights reserved.<br>
    </footer>

</body>
</html>
